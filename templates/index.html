<!DOCTYPE html>
<html>
<head>
    <title>grokCoder Debugger</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h1>grokCoder Debugger <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button></h1>
    <p class="subtitle">Tool execution reports from grokCoder AI sessions</p>
    
    <div class="filters">
        <label>Time range:</label>
        <select id="timeRange" onchange="loadData()">
            <option value="hour">Last hour</option>
            <option value="day" selected>Last 24 hours</option>
            <option value="week">Last 7 days</option>
            <option value="month">Last 30 days</option>
            <option value="all">All time</option>
        </select>
        <input type="text" id="searchBox" placeholder="Search..." oninput="filterTable()">
        <label>Cluster:</label>
        <select id="clusterSelect" onchange="loadData()">
            {% for cluster in clusters %}
            <option value="{{ cluster }}">{{ cluster }}</option>
            {% endfor %}
        </select>
        <button id="addClusterBtn" class="filters button" onclick="openClusterManager()">+</button>
        <span id="connStatus" class="conn-status" title="Checking...">⏳</span>
    </div>
    
    <div class="stats">
        <div class="stat-card errors"><div class="number" id="toolErrorCount">-</div><div class="label">Tool Errors</div></div>
        <div class="stat-card sessions"><div class="number" id="totalReportCount">-</div><div class="label">Total Reports</div></div>
        <div class="stat-card bugs"><div class="number" id="uniqueDocCount">-</div><div class="label">Unique Docs</div></div>
    </div>
    
    <div class="charts-row">
        <div class="chart-card" style="flex: 1;">
            <h4>📊 Tool Errors by Tool</h4>
            <div id="toolErrorChart" class="chart-container"></div>
        </div>
    </div>
    
    <table id="errorTable">
        <thead>
            <tr>
                <th>Tool Name</th>
                <th>Exec Time</th>
                <th>Doc ID</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="5" class="empty">Loading...</td></tr>
        </tbody>
    </table>
    
    <!-- JSON Viewer Modal -->
    <div class="modal-overlay" id="jsonModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Report: <span id="modalSessionId">...</span></h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-tabs">
                <div class="modal-tab" data-tab="full" onclick="switchTab('full')">Full JSON</div>
                <div class="modal-tab ai-tab" data-tab="ai" onclick="switchTab('ai')">🤖 AI Inputs</div>
            </div>
            <div class="modal-body">
                <div id="tabFull" class="json-viewer"></div>
                <div id="tabAi" class="ai-inputs" style="display:none"></div>
            </div>
        </div>
    <div id="clusterManager" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2>Cluster Manager</h2>
          <button class="modal-close" onclick="closeClusterManager()">&times;</button>
        </div>
        <div id="clusterList"></div>
        <h3>Add New Cluster</h3>
        <form id="addClusterForm">
          <label>Name:</label>
          <input type="text" name="name" placeholder="Unique name" required>
          <label>Host:</label>
          <input type="text" name="host" placeholder="e.g., localhost or cb://cluster" required>
          <label>User:</label>
          <input type="text" name="user" placeholder="Administrator" required>
          <label>Password:</label>
          <input type="password" name="pass" required>
          <label>Bucket:</label>
          <input type="text" name="bucket" placeholder="grokCoder" required>
          <div class="form-buttons">
            <button type="button" onclick="testCluster('addClusterForm')">Test</button>
            <button type="submit">Add</button>
          </div>
        </form>
        <div id="addTestResult" class="test-result"></div>
      </div>
    </div>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
