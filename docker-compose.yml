services:
  web:
    build: .
    ports:
      - "7777:7777"
    env_file:
      - .env
    volumes:
      - .:/app
      - ./data:/data
    environment:
      - PYTHONUNBUFFERED=1
      # --- Grok / xAI ---
      - GROK_API_KEY=${GROK_API_KEY:-}
      - GROK_MODEL=${GROK_MODEL:-grok-4-latest}
      - GROK_API_URL=${GROK_API_URL:-https://api.x.ai/v1/chat/completions}
      - GROK_TIMEOUT_SEC=${GROK_TIMEOUT_SEC:-360}
      # --- GitHub ---
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-Fujio-Turner/continue-vscode-todos-tool}
      # --- Triage pipeline ---
      - DAILY_ISSUE_QUOTA=${DAILY_ISSUE_QUOTA:-10}
      - POLL_INTERVAL_SEC=${POLL_INTERVAL_SEC:-60}
      - POLLER_ENABLED=${POLLER_ENABLED:-true}
      - STATE_FILE=${STATE_FILE:-/data/state.json}
    restart: unless-stopped
